<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Tech Shop - Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1f3a 0%, #2d3561 50%, #1a1f3a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .nav-tabs {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(26, 31, 58, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(79, 172, 254, 0.3);
            padding: 1rem 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-tab {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-tab:hover {
            color: #fff;
            border-color: rgba(79, 172, 254, 0.5);
            background: rgba(79, 172, 254, 0.1);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            border-color: transparent;
            font-weight: 700;
        }

        .nav-user {
            margin-left: auto;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .nav-logout {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 2rem;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .login-card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #4facfe;
            background: rgba(79, 172, 254, 0.1);
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .form-select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 7.5L10 12.5L15 7.5' stroke='%234facfe' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 3rem;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
        }

        .btn-primary:disabled {
            background: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
        }

        .btn-start {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.7rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }

        .btn-start:disabled {
            background: rgba(16, 185, 129, 0.5);
            cursor: not-allowed;
        }
        
        .btn-reprint {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-left: 0.5rem;
        }
        
        .btn-reprint:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-reprint:disabled {
            background: rgba(16, 185, 129, 0.3);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .btn-delete {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-left: 0.5rem;
        }
        
        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .reprint-unit-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1.5rem 0;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .reprint-unit-item {
            background: rgba(79, 172, 254, 0.1);
            border: 2px solid rgba(79, 172, 254, 0.3);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .reprint-unit-item:hover {
            background: rgba(79, 172, 254, 0.2);
            border-color: #4facfe;
        }
        
        .reprint-unit-item.selected {
            background: rgba(79, 172, 254, 0.3);
            border-color: #4facfe;
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3);
        }
        
        .reprint-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #4facfe;
        }
        
        .reprint-unit-details {
            flex: 1;
        }
        
        .reprint-unit-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4facfe;
            margin-bottom: 0.3rem;
        }
        
        .reprint-unit-specs {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .reprint-spec-item {
            display: flex;
            gap: 0.3rem;
        }
        
        .reprint-spec-label {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .reprint-spec-value {
            color: #fff;
        }
        
        .reprint-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-reprint-confirm {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-reprint-confirm:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-reprint-confirm:disabled {
            background: rgba(16, 185, 129, 0.3);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .btn-reprint-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-reprint-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .table-container {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .search-filter {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 0.75rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 0.95rem;
        }

        /* ── Completed Sidebar ── */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .completed-sidebar {
            position: fixed;
            top: 0; right: 0;
            width: 420px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1f3a 0%, #212847 100%);
            border-left: 2px solid rgba(16,185,129,0.35);
            box-shadow: -8px 0 40px rgba(0,0,0,0.5);
            z-index: 1600;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .completed-sidebar.open { transform: translateX(0); }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.4rem 1.5rem;
            border-bottom: 1px solid rgba(16,185,129,0.25);
            background: rgba(16,185,129,0.08);
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .sidebar-badge {
            background: rgba(16,185,129,0.25);
            color: #10b981;
            border-radius: 20px;
            padding: 0.15rem 0.65rem;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .sidebar-close {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            cursor: pointer;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .sidebar-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .sidebar-search {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        .sidebar-search input {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .sidebar-search input:focus { border-color: #10b981; }
        .sidebar-search input::placeholder { color: rgba(255,255,255,0.35); }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: rgba(16,185,129,0.3); border-radius: 4px; }
        .completed-card {
            background: rgba(16,185,129,0.06);
            border: 1.5px solid rgba(16,185,129,0.2);
            border-radius: 14px;
            padding: 1rem 1.1rem;
            transition: all 0.2s ease;
        }
        .completed-card:hover {
            background: rgba(16,185,129,0.12);
            border-color: rgba(16,185,129,0.4);
            transform: translateY(-1px);
        }
        .completed-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .completed-card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }
        .completed-card-badge {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            border-radius: 6px;
            padding: 0.15rem 0.5rem;
            font-size: 0.72rem;
            font-weight: 700;
            white-space: nowrap;
            margin-left: 0.5rem;
            flex-shrink: 0;
        }
        .completed-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.75rem;
            margin-bottom: 0.65rem;
        }
        .completed-card-chip {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .completed-card-chip span { color: rgba(255,255,255,0.8); }
        .completed-card-dates {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.65rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .completed-date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .completed-date-label {
            color: rgba(255,255,255,0.4);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-size: 0.68rem;
        }
        .completed-date-value {
            color: rgba(255,255,255,0.7);
            font-size: 0.78rem;
        }
        .completed-date-value.green { color: #10b981; font-weight: 600; }
        .completed-card-actions { display: flex; gap: 0.5rem; }
        .card-btn-reprint {
            flex: 1;
            background: rgba(16,185,129,0.12);
            border: 1.5px solid rgba(16,185,129,0.35);
            color: #10b981;
            border-radius: 8px;
            padding: 0.45rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .card-btn-reprint:hover { background: rgba(16,185,129,0.25); border-color: #10b981; }
        .card-btn-delete {
            background: rgba(239,68,68,0.08);
            border: 1.5px solid rgba(239,68,68,0.25);
            color: #ef4444;
            border-radius: 8px;
            padding: 0.45rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .card-btn-delete:hover { background: rgba(239,68,68,0.2); border-color: #ef4444; }
        .sidebar-empty { text-align: center; padding: 3rem 1rem; color: rgba(255,255,255,0.35); }
        .sidebar-empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .completed-toggle-btn {
            background: rgba(16,185,129,0.12);
            border: 1.5px solid rgba(16,185,129,0.4);
            color: #10b981;
            border-radius: 10px;
            padding: 0.55rem 1rem;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .completed-toggle-btn:hover {
            background: rgba(16,185,129,0.22);
            border-color: #10b981;
            transform: translateY(-1px);
        }
        .queue-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .queue-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4facfe;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .queue-badge {
            background: rgba(79,172,254,0.2);
            color: #4facfe;
            border-radius: 20px;
            padding: 0.15rem 0.65rem;
            font-size: 0.8rem;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(0, 0, 0, 0.3);
        }

        th {
            padding: 1rem 1.5rem;
            text-align: left;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(79, 172, 254, 0.1);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 2rem;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1f3a 0%, #2d3561 100%);
            border-radius: 20px;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4facfe;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
        }

        .unit-info {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.2), rgba(0, 242, 254, 0.2));
            border: 2px solid #4facfe;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .unit-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4facfe;
        }

        .unit-progress {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5rem;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(79, 172, 254, 0.1);
            border: 2px solid rgba(79, 172, 254, 0.3);
            border-radius: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #4facfe;
        }

        .checkbox-group label {
            cursor: pointer;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .grid-3 {
            display: grid;

                    await db.collection('studentTechBatches').doc(batch.id).update({ units });

                const incompleteUnit = batch.units.find(u => !u.completed);
                if (!incompleteUnit) {

                setSelectedBatch(batch);

                if (batch.sameSKUForAll && batch.batchSKU) {

                if (incompleteUnit.unitNumber > 1 && batch.sameSKUForAll && batch.units) {

                    setSuccessMessage(`✅ ${selectedBatchIds.size} batch(es) deleted!`);

                    setSelectedBatchIds(new Set());
                    loadBatches();

                    setTimeout(() => setErrorMessage(''), 5000);

                    next.has(id) ? next.delete(id) : next.add(id);
                    return next;
                });
            };

                const allIds = batchList.map(b => b.id);
                const allSelected = allIds.every(id => selectedBatchIds.has(id));
                if (allSelected) {
                    setSelectedBatchIds(prev => {
                        const next = new Set(prev);
                        allIds.forEach(id => next.delete(id));
                        return next;
                    });
                } else {

                                    <button className="modal-close" onClick={() => setReprintBatch(null)}>×</button>
                                </div>
                                
                                <div className="unit-info">
                                    <div style={{fontSize: '1.2rem', fontWeight: 700, color: '#fff', marginBottom: '0.5rem'}}>
                                        {reprintBatch.deviceName || reprintBatch.category}
                                    </div>
                                    <div style={{color: 'rgba(255,255,255,0.7)'}}>
                                        {reprintBatch.vendor} • {reprintBatch.category}
                                    </div>
                                </div>
                                
                                <div style={{marginBottom: '1rem', color: 'rgba(255,255,255,0.8)'}}>
                                    Select which unit(s) to reprint:
                                </div>
                                
                                <div className="reprint-unit-list">
                                    {reprintBatch.units
                                        .filter(unit => unit.completed)
                                        .map(unit => {
                                            const isSelected = selectedUnitsForReprint.includes(unit.unitNumber);
                                            return (
                                                <div
                                                    key={unit.unitNumber}
                                                    className={`reprint-unit-item ${isSelected ? 'selected' : ''}`}
                                                    onClick={() => handleToggleUnitForReprint(unit.unitNumber)}
                                                >
                                                    <input
                                                        type="checkbox"
                                                        className="reprint-checkbox"
                                                        checked={isSelected}
                                                        onChange={() => handleToggleUnitForReprint(unit.unitNumber)}
                                                        onClick={(e) => e.stopPropagation()}
                                                    />
                                                    
                                                    <div className="reprint-unit-details">
                                                        <div className="reprint-unit-number">
                                                            Unit #{unit.unitNumber}
                                                        </div>
                                                        <div className="reprint-unit-specs">
                                                            {unit.specs.sku && (
                                                                <div className="reprint-spec-item">
                                                                    <span className="reprint-spec-label">SKU:</span>
                                                                    <span className="reprint-spec-value">{unit.specs.sku}</span>
                                                                </div>
                                                            )}
                                                            {unit.specs.brand && (
                                                                <div className="reprint-spec-item">
                                                                    <span className="reprint-spec-label">Brand:</span>
                                                                    <span className="reprint-spec-value">{unit.specs.brand}</span>
                                                                </div>
                                                            )}
                                                            {unit.specs.model && (
                                                                <div className="reprint-spec-item">
                                                                    <span className="reprint-spec-label">Model:</span>
                                                                    <span className="reprint-spec-value">{unit.specs.model}</span>
                                                                </div>
                                                            )}
                                                            {unit.specs.storage && (
                                                                <div className="reprint-spec-item">
                                                                    <span className="reprint-spec-label">Storage:</span>
                                                                    <span className="reprint-spec-value">{unit.specs.storage}</span>
                                                                </div>
                                                            )}
                                                            {unit.specs.ram && (
                                                                <div className="reprint-spec-item">
                                                                    <span className="reprint-spec-label">RAM:</span>
                                                                    <span className="reprint-spec-value">{unit.specs.ram}</span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    }
                                </div>
                                
                                <div className="reprint-actions">
                                    <button className="btn-reprint-cancel" onClick={() => setReprintBatch(null)}>
                                        Cancel
                                    </button>
                                    <button 
                                        className="btn-reprint-confirm" 
                                        onClick={handleReprintSelected}
                                        disabled={selectedUnitsForReprint.length === 0}
                                    >
                                        Print {selectedUnitsForReprint.length > 0 ? `${selectedUnitsForReprint.length} Label(s)` : 'Selected'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── BATCH COMPLETION CHECKLIST MODAL ── */}
                    {checklistModal && (
                        <div className="modal-overlay">
                            <div className="modal-content" style={{maxWidth: '500px'}} onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2 className="modal-title">🎉 Batch Complete!</h2>
                                </div>

                                <div style={{background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.3)', borderRadius: '12px', padding: '1rem 1.25rem', marginBottom: '1.5rem'}}>
                                    <div style={{fontWeight: 700, color: '#10b981', marginBottom: '0.25rem', fontSize: '1rem'}}>{checklistModal.deviceName}</div>
                                    <div style={{fontSize: '0.85rem', color: 'rgba(255,255,255,0.6)'}}>
                                        Make sure the SKU on the label matches Shopify: <span style={{color: '#fff', fontWeight: 700, fontFamily: 'monospace'}}>{checklistModal.sku}</span>
                                    </div>
                                </div>

                                <div style={{fontSize: '0.9rem', color: 'rgba(255,255,255,0.6)', marginBottom: '1rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px'}}>
                                    Shopify Checklist
                                </div>

                                <div style={{display: 'flex', flexDirection: 'column', gap: '0.75rem', marginBottom: '2rem'}}>
                                    {[
                                        { key: 'listed',      label: 'Product listed on website' },
                                        { key: 'cost',        label: 'Cost updated' },
                                        { key: 'price',       label: 'Price updated on Shopify' },
                                        { key: 'description', label: 'Description updated' },
                                        { key: 'quantity',    label: 'Quantity updated' },
                                    ].map(item => {
                                        const checked = checklistModal.checks[item.key];
                                        return (
                                            <div
                                                key={item.key}
                                                onClick={() => setChecklistModal(prev => ({
                                                    ...prev,
                                                    checks: { ...prev.checks, [item.key]: !prev.checks[item.key] }
                                                }))}
                                                style={{
                                                    display: 'flex', alignItems: 'center', gap: '0.9rem',
                                                    padding: '0.85rem 1rem',
                                                    background: checked ? 'rgba(16,185,129,0.12)' : 'rgba(255,255,255,0.04)',
                                                    border: `1.5px solid ${checked ? 'rgba(16,185,129,0.5)' : 'rgba(255,255,255,0.1)'}`,
                                                    borderRadius: '10px', cursor: 'pointer', transition: 'all 0.2s'
                                                }}
                                            >
                                                <div style={{
                                                    width: '22px', height: '22px', borderRadius: '6px', flexShrink: 0,
                                                    background: checked ? '#10b981' : 'transparent',
                                                    border: `2px solid ${checked ? '#10b981' : 'rgba(255,255,255,0.3)'}`,
                                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                    fontSize: '13px', transition: 'all 0.2s'
                                                }}>
                                                    {checked ? '✓' : ''}
                                                </div>
                                                <span style={{fontWeight: 600, color: checked ? '#fff' : 'rgba(255,255,255,0.7)', fontSize: '0.95rem'}}>
                                                    {item.label}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>

                                <button
                                    onClick={async () => {
                                        try {
                                            await db.collection('studentTechBatches').doc(checklistModal.batchId).update({
                                                status: 'completed',
                                                completedAt: new Date().toISOString(),
                                                shopifyChecklist: checklistModal.checks
                                            });
                                            setChecklistModal(null);
                                            loadBatches();
                                            setSuccessMessage('✅ Batch fully completed and published!');
                                            setTimeout(() => setSuccessMessage(''), 3000);
                                        } catch (e) {
                                            setErrorMessage('❌ Failed to save: ' + e.message);
                                            setTimeout(() => setErrorMessage(''), 4000);
                                        }
                                    }}
                                    disabled={!Object.values(checklistModal.checks).every(Boolean)}
                                    style={{
                                        width: '100%', padding: '0.9rem',
                                        background: Object.values(checklistModal.checks).every(Boolean)
                                            ? 'linear-gradient(135deg, #10b981, #059669)'
                                            : 'rgba(255,255,255,0.1)',
                                        color: '#fff', border: 'none', borderRadius: '12px',
                                        fontWeight: 700, fontSize: '1rem', cursor: Object.values(checklistModal.checks).every(Boolean) ? 'pointer' : 'not-allowed',
                                        transition: 'all 0.3s'
                                    }}
                                >
                                    {Object.values(checklistModal.checks).every(Boolean) ? '✅ All Done — Close' : `Complete all ${Object.values(checklistModal.checks).filter(Boolean).length}/5 items to continue`}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
